name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write    

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. Checkout repo
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v3

    # =========================
    # 2. Setup Python
    # =========================
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # =========================
    # 3. Install dependencies
    # =========================
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # =========================
    # 4. Install Chrome (needed for Selenium)
    # =========================
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    # =========================
    # 5. Run tests (SMOKE on PR, REGRESSION on main)
    # =========================

    - name: Run SMOKE tests (PR)
      if: github.event_name == 'pull_request'
      run: |
        pytest -m smoke -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1 -q

    - name: Run REGRESSION tests (MAIN)
      if: github.ref == 'refs/heads/main'
      run: |
        pytest -m "regression and not flaky" -n auto --alluredir=allure-results --reruns 2 --reruns-delay 1 -q

    # =========================
    # 6. Generate Allure Report
    # =========================
    - name: Install Allure CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre
        wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.39.0.tgz
        tar -xzf allure-2.39.0.tgz
        sudo mv allure-2.39.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    - name: Generate Allure Report
      run: |
        allure generate allure-results -o allure-report --clean

    # =========================
    # 7. Upload artifacts (backup)
    # =========================
    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results

    - name: Upload Allure report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report

    # =========================
    # 8. Deploy Allure Report to GitHub Pages
    # =========================
    - name: Deploy report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        force_orphan: true